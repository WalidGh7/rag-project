services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./thesis:/app/thesis
      # Mount AWS credentials so the container can reach S3
      - ~/.aws:/root/.aws:ro
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg_data:
